name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset: pvm.exe
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset: pvm-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset: pvm-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.version=${VERSION}" -o ${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "pvm ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/pvm.exe/pvm.exe \
            dist/pvm-darwin-amd64/pvm-darwin-amd64 \
            dist/pvm-darwin-arm64/pvm-darwin-arm64
